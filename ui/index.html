<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Compute</title>
  <style>
    /* General styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .body {
      position: relative;
      text-align: center;
      padding: 80px 20px;
    }

    /* Background image styling */
    .bg {
      position: absolute;
      top: 165%;
      left: 50%;
      transform: translate(-50%, -60%) scale(0.6); /* Shrink image to 50% */
      width: auto;
      height: auto;
      z-index: 1;
    }

    /* Content container styling */
    .content {
      position: relative;
      z-index: 2; /* Ensure content is above the background */
    }

    /* Buttons container */
    .buttons {
      margin-top: 50px; /* Adjust positioning of buttons */
    }

    /* Button styling */
    .button {
      width: 100px;
      margin-bottom: -270px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="body">
    <!-- Background image -->
    <img src="bg.jpg" alt="Background" class="bg">

    <!-- Content -->
    <div class="content">

      <!-- Buttons -->
      <div class="buttons">
        <img src="button1.jpg" alt="Go to Canvas" class="button">
        <img src="button2.jpg" alt="Upload Image" class="button">
      </div>
    </div>
  </div>
</body>
</html>
